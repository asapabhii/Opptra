services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY}
      - XAI_BASE_URL=${XAI_BASE_URL}
      - XAI_MODEL=${XAI_MODEL}
      - DATABASE_PATH=/app/data/decisions.db
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/portfolio/summary"]
      interval: 30s
      timeout: 10s
      retries: 3
